# ==========================================
#       RPlace 属性进化中心 核心配置文件
# ==========================================

# 体力上限进化配置 (Max Points)
max_points:
  # 初始体力值 (玩家刚加入或重置后的数值)
  base_value: 1
  
  # 升级加成 (每个等级额外增加的具体数值)
  # 逻辑：当前等级获得的加成是累加的。例如升到Lv3，总体力 = 初始1 + Lv2加成 + Lv3加成
  bonuses:
    2: 2    # 升到 2 级增加 2 点
    3: 2    # 升到 3 级增加 2 点
    4: 2    # 升到 4 级增加 2 点
    5: 5    # 升到 5 级增加 5 点 (进入中期，增幅提升)
    6: 5    # 升到 6 级增加 5 点
    7: 10   # 升到 7 级增加 10 点 (后期发力)
    8: 10   # 升到 8 级增加 10 点
    9: 15   # 升到 9 级增加 15 点
    10: 15  # 升到 10 级增加 15 点

  # 升级花费 (单位：金币)
  costs:
    2: 5000
    3: 15000
    4: 40000
    5: 90000
    6: 180000
    7: 350000
    8: 600000
    9: 900000
    10: 1200000

# 恢复速率进化配置 (Recover Speed)
recover_speed:
  # 初始恢复周期 (单位：秒，数值越大恢复越慢)
  base_value: 60
  
  # 每级固定缩减的时间 (单位：秒)
  # 逻辑：Lv1是60s, Lv2是(60-4)=56s, Lv3是(60-4*2)=52s...
  reduction_per_level: 4
  
  # 升级花费 (单位：金币)
  costs:
    2: 8000
    3: 25000
    4: 60000
    5: 150000
    6: 300000
    7: 550000
    8: 900000
    9: 1300000
    10: 1800000

# 重置进化进度配置 (Reset Settings)
reset_settings:
  # 重置所需的金币花费
  cost: 5000
  # 触发重置需要连续点击的次数 (防误触机制)
  required_clicks: 10

# ==========================================
#       玩家进化数据 (自动保存)
# ==========================================
player_data:
# 存储格式示例:
# "uuid-string":
#   name: "PlayerName"
#   stamina_level: 1
#   recovery_level: 1