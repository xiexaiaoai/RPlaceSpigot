# ==========================================
#       RPlace 属性进化中心 核心配置文件
# ==========================================

# 体力上限进化配置 (Max Points)
max_points:
  # 初始体力值 (玩家刚加入或重置后的数值)
  base_value: 1
  
  # 升级加成 (每个等级额外增加的具体数值)
  # 逻辑：前几级增加较少，5-8级作为中期大幅提升，最后平稳收官
  bonuses:
    2: 4    # 升到 2 级增加 4 点 (总: 5)
    3: 5    # 升到 3 级增加 5 点 (总: 10)
    4: 10   # 升到 4 级增加 10 点 (总: 20)
    5: 20   # 升到 5 级增加 20 点 (总: 40 - 进入中期，大幅提升)
    6: 20   # 升到 6 级增加 20 点 (总: 60)
    7: 20   # 升到 7 级增加 20 点 (总: 80)
    8: 20   # 升到 8 级增加 20 点 (总: 100)
    9: 10   # 升到 9 级增加 10 点 (总: 110 - 后期平稳)
    10: 10  # 升到 10 级增加 10 点 (总: 120)

  # 升级花费 (单位：金币)
  costs:
    2: 5000
    3: 15000
    4: 40000
    5: 90000
    6: 180000
    7: 350000
    8: 600000
    9: 900000
    10: 1200000

# 恢复速率进化配置 (Recover Speed)
recover_speed:
  # 初始恢复周期 (单位：秒)
  base_value: 60

  # 每级固定缩减的时间 (单位：秒)
  # 60 - (4.45 * 9) ≈ 20
  reduction_per_level: 4.45

  # 升级花费 (单位：金币)
  costs:
    2: 8000
    3: 25000
    4: 60000
    5: 150000
    6: 300000
    7: 550000
    8: 900000
    9: 1300000
    10: 1800000

# 重置进化进度配置 (Reset Settings)
reset_settings:
  # 重置所需的金币花费
  cost: 5000
  # 触发重置需要连续点击的次数
  required_clicks: 10

# ==========================================
#       玩家进化数据 (自动保存)
# ==========================================
player_data:
# 存储格式示例:
# "uuid-string":
#   name: "PlayerName"
#   stamina_level: 1
#   recovery_level: 1