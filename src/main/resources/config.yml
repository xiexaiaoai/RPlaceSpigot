# RPlace 插件配置文件
# 注意：本文件支持指令自动修改，手动修改后请重启服务器或重载插件

# 画布核心区域设置
canvas:
  # 画布所在的世界名称
  world: "world"
  # 画布的 X 轴最小边界（已包含内缩后的值）
  minX: 0
  # 画布的 X 轴最大边界
  maxX: 0
  # 画布的 Z 轴最小边界
  minZ: 0
  # 画布的 Z 轴最大边界
  maxZ: 0
  # 画布所在的固定 Y 高度层
  y: 64
  # 画布是否已配置并激活（false 时插件功能暂不开启）
  isSet: false

# 插件全局运行逻辑设置
settings:
  # 默认的全局操作冷却时间（单位：秒）
  globalCooldown: 60

# 玩家个性化数据存储区
# 插件会自动记录玩家的 UUID 及其专属冷却时间，请勿手动编辑此项
players:
  personalCD:
    # 格式示例 - "UUID": 秒数
    "example-uuid-here": 0