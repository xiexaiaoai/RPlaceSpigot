# ==============================================================================
#
#    EconomyCore v2.0 | 自动化经济与独立限购系统
#
#    [提示] 建议在游戏内使用指令添加物品，以完美保存 NBT (名称、附魔等)
#    [时间单位说明] s = 秒 | m = 分 | h = 小时 | d = 天 | w = 周
#
# ==============================================================================

# [核心调度器]
shop_settings:
  # 刷新频率：每隔多久重置【随机商店内容】和【全服玩家限额】
  refresh_interval: "24h"
  # 系统自动记录的时间戳，手动改为 0 可触发即时刷新
  last_refresh: 0

# [随机商店：算法配置]
random_shop:
  # 每次刷新从总仓库中随机抽取上架的数量范围
  min_items: 3
  max_items: 7
  # 当前柜台展示的物品（系统自动生成，请勿手动编辑）
  pool: {}

# [全球市场：长期货架]
# 默认商店 (通过 /money 打开或持 ID:0 的钟打开)
market:
  items: {}

# [维度商店：特定通道]
# 这里的配置对应你手持钟的 ID (如 ID 为 3 的钟打开的就是 market_dimension_3)
# 你可以根据需要无限复制这些节点：
market_dimension_3:
  items: {}

market_dimension_4:
  items: {}

# [物品总仓库：随机商店的来源]
# 所有通过 /money additem random 添加的物品都会存放在此
random_pool_source: {}

# [联动奖励：RPlace 填色]
rewards:
  place_pixel: 1.0

# [持久化存储：资产与记录]
players:
  # 玩家钱包余额数据 (UUID: 金额)
  data: {}

# 玩家在该周期内的交易记录 (系统自动清理，请勿编辑)
player_data: {}

# ==============================================================================
# [维度商店操作指南]
# 1. 想要新维度？ -> 复制 `market_dimension_3:` 整个区块并改名。
# 2. 想要发钟？   -> 游戏内执行 `/money give <玩家名> 维度ID`。
# 3. 偷懒技巧：   -> 在游戏内用 `/money additem market` 上架，
#                   然后把生成的物品节点从 `market.items` 剪切到 `market_dimension_X.items`。
# ==============================================================================